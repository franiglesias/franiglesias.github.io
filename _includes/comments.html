{% if site.commentbox %}
<div class="commentbox"></div>
<script defer src="https://unpkg.com/commentbox.io/dist/commentBox.min.js"></script>
<script defer>
    // Initialize standard CommentBox with transparent background
    window.addEventListener('load', function() {
        commentBox('{{ site.commentbox }}', {
            backgroundColor: 'transparent' // Adapts to parent container background
        });
    });
</script>

{% endif %}
