<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
  </style>
</head>
<body>
<div class="commentbox"></div>

<script src="https://unpkg.com/commentbox.io/dist/commentBox.min.js"></script>
<script>
  // 1. Detectamos el tema leyendo los parámetros de la URL (?theme=dark)
  var params = new URLSearchParams(window.location.search);
  var theme = params.get('theme') || 'light';
  var isDark = theme === 'dark';

  // 2. Inicializamos CommentBox una única vez con el tema limpio
  commentBox('{{ site.commentbox }}', {
    backgroundColor: isDark ? '#1a1a1a' : '#ffffff',
    textColor: isDark ? '#f5f5f5' : '#2c3e50',
    subtextColor: isDark ? '#999999' : '#7f8c8d'
  });
</script>
</body>
</html>
